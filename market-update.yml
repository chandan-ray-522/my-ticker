name: Market Update

on:

  schedule:

    - cron: "*/30 4-10 * * 1-5"

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 18

      - name: Install Dependencies

        run: npm install

      - name: Run Market Script

        env:

          RAPIDAPI_KEY:
            ${{ secrets.RAPIDAPI_KEY }}

        run: node update-market.js

      - name: Commit Updated JSON

        run: |

          git config user.name "github-actions"

          git config user.email "actions@github.com"

          git add market-data.json

          git diff --quiet && git diff --staged --quiet || git commit -m "Market Update"

          git push